<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Smart Voting</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            height: 100vh;
        }

        .login-card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease-in-out;
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .form-control:focus {
            box-shadow: none;
            background: rgba(255,255,255,0.15);
        }

        .btn-login {
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
        }

        .toggle-password {
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
        }

        .back-link {
            text-decoration: none;
            color: #ccc;
            font-weight: 500;
        }

        .back-link:hover {
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center h-100">
    <div class="col-md-5">

        <div class="login-card">

            <h3 class="text-center mb-4 fw-bold">🛡 Admin Panel Login</h3>
            <p class="text-center mb-4">Secure access to election management system</p>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter admin username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                    <div class="text-end mt-1">
                        <span class="toggle-password" onclick="togglePassword()">Show Password</span>
                    </div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">
                        Remember me
                    </label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-light btn-login">
                        Login to Admin Panel
                    </button>
                </div>

            </form>

            <div class="text-center mt-4">
                <a href="/" class="back-link">
                    ← Back to Home
                </a>
            </div>

        </div>

    </div>
</div>

<script>
function togglePassword() {
    const passwordField = document.getElementById("password");
    const toggleText = document.querySelector(".toggle-password");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleText.textContent = "Hide Password";
    } else {
        passwordField.type = "password";
        toggleText.textContent = "Show Password";
    }
}
</script>

</body>
</html>
